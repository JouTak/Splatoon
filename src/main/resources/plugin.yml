name: ${NAME}
version: ${VERSION}
api-version: ${MINECRAFT_VERSION}
main: ru.joutak.splatoon.SplatoonPlugin
description: 'splatoon'
authors: ['Saldaw', 'technosimp', ]
contributors: ['EnderDissa']
website: ${WEBSITE}
commands:
  splatoon:
    description: "Splatoon admin utilities"
    usage: "/splatoon get <gun|bomb|bacillus>"
    aliases: [sp]

permissions:
  splatoon.admin:
    description: "Admin tools for Splatoon"
    default: op

depend: []
libraries:
  - 'org.jetbrains.kotlin:kotlin-stdlib:${KOTLIN_VERSION}'